apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: block-kubeadmcontrolplane-deletion-if-has-workers
spec:
  steps:
  - name: install-kubeadmcontrolplane-crd
    try:
    - apply:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: kubeadmcontrolplanes.controlplane.cluster.x-k8s.io
          spec:
            group: controlplane.cluster.x-k8s.io
            names:
              kind: KubeadmControlPlane
              listKind: KubeadmControlPlaneList
              plural: kubeadmcontrolplanes
              singular: kubeadmcontrolplane
            scope: Namespaced
            versions:
            - name: v1beta1
              served: true
              storage: true
              schema:
                openAPIV3Schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              subresources:
                status: {}

  - name: install-machinedeployment-crd
    try:
    - apply:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: machinedeployments.cluster.x-k8s.io
          spec:
            group: cluster.x-k8s.io
            names:
              kind: MachineDeployment
              listKind: MachineDeploymentList
              plural: machinedeployments
              singular: machinedeployment
            scope: Namespaced
            versions:
            - name: v1beta1
              served: true
              storage: true
              schema:
                openAPIV3Schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              subresources:
                status: {}

  - name: install-machinepool-crd
    try:
    - apply:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: machinepools.cluster.x-k8s.io
          spec:
            group: cluster.x-k8s.io
            names:
              kind: MachinePool
              listKind: MachinePoolList
              plural: machinepools
              singular: machinepool
            scope: Namespaced
            versions:
            - name: v1beta1
              served: true
              storage: true
              schema:
                openAPIV3Schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              subresources:
                status: {}

  - name: check-policy-ready
    use:
      template: ../_steps-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: block-kubeadmcontrolplane-deletion-if-has-workers

  # No workers exist for this cluster: delete KCP succeeds
  - name: allow-delete-kcp-without-workers
    try:
    - apply:
        resource:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          metadata:
            name: kcp-no-workers
            labels:
              cluster.x-k8s.io/cluster-name: cluster-no-workers
          spec: {}
    - delete:
        ref:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          name: kcp-no-workers

  # A MachineDeployment belonging to the same cluster exists: delete KCP fails
  - name: deny-delete-kcp-with-machinedeployment
    try:
    - apply:
        resource:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          metadata:
            name: kcp-with-md
            labels:
              cluster.x-k8s.io/cluster-name: cluster-with-md
          spec: {}
    - apply:
        resource:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          metadata:
            name: md-for-kcp
            labels:
              cluster.x-k8s.io/cluster-name: cluster-with-md
          spec: {}
    - delete:
        expect:
        - check:
            ($error != null): true
        ref:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          name: kcp-with-md
    cleanup:
    - delete:
        ref:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          name: md-for-kcp
    - delete:
        ref:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          name: kcp-with-md

  # A MachinePool belonging to the same cluster exists: delete KCP fails
  - name: deny-delete-kcp-with-machinepool
    try:
    - apply:
        resource:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          metadata:
            name: kcp-with-mp
            labels:
              cluster.x-k8s.io/cluster-name: cluster-with-mp
          spec: {}
    - apply:
        resource:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachinePool
          metadata:
            name: mp-for-kcp
            labels:
              cluster.x-k8s.io/cluster-name: cluster-with-mp
          spec: {}
    - delete:
        expect:
        - check:
            ($error != null): true
        ref:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          name: kcp-with-mp
    cleanup:
    - delete:
        ref:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachinePool
          name: mp-for-kcp
    - delete:
        ref:
          apiVersion: controlplane.cluster.x-k8s.io/v1beta1
          kind: KubeadmControlPlane
          name: kcp-with-mp
