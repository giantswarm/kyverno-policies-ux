apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: block-resource-deletion-if-has-prevent-deletion-label
spec:
  steps:
  - name: check-policy-ready
    use:
      template: ../_steps-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: block-resource-deletion-if-has-prevent-deletion-label

  - name: allow-delete-without-label
    try:
    - apply:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cm-no-prevent-label
          data:
            key: value
    - delete:
        ref:
          apiVersion: v1
          kind: ConfigMap
          name: cm-no-prevent-label

  # The protected ConfigMap is created here and intentionally NOT cleaned up in this step.
  # It is deleted in the allow-delete-after-label-removal-2 step below so that when
  # chainsaw's auto-cleanup for this step runs (in reverse order), the resource is already gone.
  - name: create-protected-configmap
    try:
    - apply:
        file: cm-with-prevent-label.yaml

  - name: deny-delete-with-prevent-label
    try:
    - delete:
        expect:
        - check:
            ($error != null): true
        ref:
          apiVersion: v1
          kind: ConfigMap
          name: cm-with-prevent-label

  - name: allow-delete-after-label-removal
    try:
    - apply:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cm-label-removed
            labels:
              giantswarm.io/prevent-deletion: "true"
          data:
            key: value
    - script:
        content: |
          kubectl label configmap cm-label-removed "giantswarm.io/prevent-deletion-" -n "$NAMESPACE"
    - delete:
        ref:
          apiVersion: v1
          kind: ConfigMap
          name: cm-label-removed

  # Remove label from cm-with-prevent-label then assert deletion succeeds.
  # Doing this in a dedicated step ensures chainsaw's reverse-order auto-cleanup
  # finds the resource already gone when it reaches create-protected-configmap.
  - name: allow-delete-protected-configmap-after-label-removal
    try:
    - script:
        content: |
          kubectl label configmap cm-with-prevent-label "giantswarm.io/prevent-deletion-" -n "$NAMESPACE"
    - delete:
        expect:
        - check:
            ($error != null): false
        ref:
          apiVersion: v1
          kind: ConfigMap
          name: cm-with-prevent-label
