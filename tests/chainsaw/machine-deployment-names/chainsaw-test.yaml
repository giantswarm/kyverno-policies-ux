apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: machine-deployment-names
spec:
  steps:
  - name: install-machinedeployment-crd
    try:
    - apply:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: machinedeployments.cluster.x-k8s.io
          spec:
            group: cluster.x-k8s.io
            names:
              kind: MachineDeployment
              listKind: MachineDeploymentList
              plural: machinedeployments
              singular: machinedeployment
            scope: Namespaced
            versions:
            - name: v1beta1
              served: true
              storage: false
              schema:
                openAPIV3Schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              subresources:
                status: {}
            - name: v1beta2
              served: true
              storage: true
              schema:
                openAPIV3Schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              subresources:
                status: {}

  - name: check-policy-ready
    use:
      template: ../_steps-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: machine-deployment-names

  # 31 chars is the maximum allowed length
  - name: allow-deployment-name-31-chars
    try:
    - apply:
        resource:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          metadata:
            name: md-with-31-chars-in-total-name3
          spec: {}

  # 32 chars exceeds the maximum
  - name: deny-deployment-name-32-chars
    try:
    - apply:
        expect:
        - check:
            ($error != null): true
        resource:
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          metadata:
            name: md-with-32-chars-in-total-name32
          spec: {}
